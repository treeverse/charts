# Default values for lakefs.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  pullPolicy: IfNotPresent
  community:
    tag: "1.81.0"
  enterprise:
    tag: "1.82.0"
  privateRegistry:
    enabled: false
    secretToken: null
    secretName: null

nameOverride: ""
fullnameOverride: ""

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  ingressClassName: ""
  defaultBackend: {}
  hosts:
    - host: chart-example.local
      paths: []
      # redirect to a different service based on path prefix for advanced use cases only
      # pathsOverrides:
      #   - path: /some/path
      #     serviceName: other-example.local
      #     servicePort: 80
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

podAnnotations: {}
jobPodAnnotations:
  sidecar.istio.io/inject: "false"

deployment:
  port: 8000

service:
  annotations: {}
  type: ClusterIP
  port: 80

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

## Topology spread constraints rely on node labels to identify the topology domain(s) that each Node is in.
## Ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/
##
topologySpreadConstraints: []

s3Fallback:
  enabled: false

gcpFallback:
  enabled: false

lakefsConfig: |
  database:
    type: local
  blockstore:
    type: local

# yamllint disable rule:comments

# Example: using node instance storage for caching committed data:
# For more information: https://www.vipmind.me/infra/aws/how-to-use-ephemeral-disk-from-ec2-instance-in-eks.html
#committedLocalCacheVolume:
#  hostPath:
#    path: /media/ephemeral0

# yamllint enable

serviceAccount: {}

# to use an existing service account, replace the serviceAccount map above with the following:
# serviceAccount:
#   name: "my-serviceaccount"

# Extra Environment Values - allows yaml definitions
extraEnvVars:
#  - name: VALUE_FROM_SECRET
#    valueFrom:
#      secretKeyRef:
#        name: secret_name
#        key: secret_key
# Override K8S defaults for readinessProbe
# readinessProbe:
#   failureThreshold: 10
#   periodSeconds: 5
#   successThreshold: 4
#   timeoutSeconds: 1
# Override K8S defaults for livenessProbe
# livenessProbe:
#   failureThreshold: 20
#   periodSeconds: 5
#   successThreshold: 4
#   timeoutSeconds: 1
#   initialDelaySeconds: 5

# https://docs.lakefs.io/latest/datamanagment/metadata-search/#configuration-reference
#
# MDS runs the metadata search service. The default image is
# `treeverse/lakefs-enterprise`, invoked as `lakefs mds run`. To roll back to
# the legacy standalone MDS container, override the image and args, e.g.:
#   mds:
#     image:
#       repository: treeverse/mds
#       tag: "0.2.1"
#     args: ["--config", "/app/config.yaml"]
#     extraEnvVars:
#       - name: PYTHONPATH
#         value: /home/arktika/.local/lib/python3.13/site-packages
mds:
  enabled: false
  image:
    pullPolicy: IfNotPresent
    # Defaults to `treeverse/lakefs-enterprise` when unset (see templates/mds/_mds.tpl).
    repository: ""
    # Defaults to `image.enterprise.tag` when unset.
    tag: ""
  # Override the container ENTRYPOINT. Empty uses the image default
  # (`/app/lakefs` for the lakeFS Enterprise image).
  command: []
  # Args appended after the ENTRYPOINT. The default runs the metadata search
  # service on the lakeFS Enterprise image; override when rolling back to the
  # legacy MDS container (which expects only `--config /app/config.yaml`).
  args:
    - mds
    - run
    - --config
    - /app/config.yaml
  extraEnvVars: {}
  resources:
    # limits:
    #   cpu: 500m
    #   memory: 256Mi
    # requests:
    #   cpu: 250m
    #   memory: 128Mi
  readinessProbe:
    httpGet:
      path: /health
      port: http
    # failureThreshold: 10
    # periodSeconds: 5
    # successThreshold: 4
    # timeoutSeconds: 1
    # initialDelaySeconds: 5
  livenessProbe:
    httpGet:
      path: /health
      port: http
    # failureThreshold: 10
    # periodSeconds: 5
    # successThreshold: 4
    # timeoutSeconds: 1
    # initialDelaySeconds: 5
  # Rendered verbatim into the MDS config file. The default schema below
  # matches the lakeFS Enterprise `metadata_search` section; replace with the
  # legacy MDS schema (`lakefs:` / `metadata_settings:` / `repositories:`)
  # when rolling back to the standalone MDS image.
  config:
    metadata_search:
      lakefs_mds_endpoint: "https://example.lakefs.io"
      access_key_id: "AKIAIOSFOLEXAMPLE"
      secret_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
      # period: 60s
      # concurrency: 25
      # max_commits: 1000
      # since: "1970-01-01T00:00:00Z"
      repositories: {}
        # example-repo-1:
        #   branches:
        #     - main
        #     - dev
        # example-repo-2:
        #   branches:
        #     - main
        #     - feature-*

# https://docs.lakefs.io/latest/howto/mirroring/
replication:
  enabled: false
  image:
    repository: treeverse/replication
    tag: 0.1.17
    pullPolicy: IfNotPresent
  port: 8008
  resources: {}
  podAnnotations: {}
  extraEnvVars: []
  extraEnvVarsSecret: null
  serviceAccountName: ""
  base_dir: /home/replication
  local_cache:
    base_dir: /cache
    size_bytes: "512000000"
  # All replication service configuration.
  # Required fields: region, organization_id, mirrors_database, auth, blockstore.
  # See services/mirroring/config.go for the full schema.
  # Note: committed.local_cache (dir and size_bytes) is automatically injected from
  #       replication.local_cache above — do not set it here.
  # Note: refstore_database is automatically populated from lakefsConfig.database
  #       if not explicitly set here.
  # Example:
  #   region: "us-east-1"
  #   organization_id: "my-org"
  #   regional_endpoint: "https://my-lakefs.us-east-1.example.com"
  #   lakefs_access_key_id: "AKIAIOSFODNN7EXAMPLE"
  #   lakefs_secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
  #   dst_endpoints:
  #     us-west-2: "https://my-lakefs.us-west-2.example.com"
  #   mirrors_database:
  #     type: dynamodb
  #     dynamodb:
  #       table_name: lakefs-replication-table
  #   refstore_database:
  #     type: dynamodb
  #     dynamodb:
  #       table_name: lakefs-refstore-my-org
  #   auth:
  #     api:
  #       endpoint: "http://lakefs:8000/api/v1"
  #     encrypt:
  #       secret_key: "some-random-secret"
  #   blockstore:
  #     type: s3
  #     s3:
  #       region: "us-east-1"
  config: {}

# Start local postgres pod for quick start, not for production
useDevPostgres: false

# Name of existing secret to use
existingSecret: null

# Keys used for existingSecret
secretKeys:
  authEncryptSecretKey: auth_encrypt_secret_key
  # Use the following to fetch PostgreSQL connection string from an existing secret:
  databaseConnectionString: null
  # Use to fetch license token from an existing secret:
  licenseContentsKey: null
  # Use the following to fetch LDAP bind password from an existing secret:
  ldapBindPassword: null
  # Use the following to fetch OIDC client secret from an existing secret:
  oidcClientSecret: null

# Enterprise configuration
enterprise:
  enabled: false

  # Enterprise auth configuration
  auth:
    rbac:
      enabled: true

    ldap:
      enabled: false
      bindPassword: null

    oidc:
      enabled: false
      clientSecret: null

    saml:
      enabled: false
      createCertificateSecret: false
      certificate:
        # certificates for AD FS IDP (e.g Azure AD)
        samlRsaPublicCert: null
        samlRsaPrivateKey: null

# Audit log maintenance CronJob (Enterprise-only).
# Requires enterprise.enabled: true and audit_log.enabled: true in lakefsConfig.
# The CronJob uses the same lakeFS config file — no credentials needed.
auditLog:
  enabled: false
  maintenance:
    # Run maintenance inside the lakeFS server process (default: true).
    # Disable to rely solely on the external CronJob instead.
    inProcess: true
    # Deploy a Kubernetes CronJob for maintenance instead of the default
    # in-process scheduler. Set to true only if you want maintenance to
    # run as a separate pod.
    cronJob: false
    # Cron schedule for the CronJob (default: every hour).
    schedule: "0 * * * *"
    # Snapshot retention in days (0 = no expiration).
    retentionDays: 90
    # Maximum time (seconds) the CronJob is allowed to run before K8s kills it (default: 8 hours).
    activeDeadlineSeconds: 28800
    # Extra CLI arguments to pass to the maintain command.
    extraArgs: []
    extraEnvVars: []
    podAnnotations: {}
    resources: {}
    nodeSelector: {}
    tolerations: []
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3

secrets:
  licenseContents: null
